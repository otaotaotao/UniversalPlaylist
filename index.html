<style>
  :root{
    --paper: #f6f0e4;
    --paper-card: #fdfbf4;
    --ink: #3a322c;
    --ink-soft: #8c8175;
    --border: #e3d9c3;
    --accent: #6b8e8a;
    --accent-deep: #4f6d69;
    --seal: #b5583f;
  }
  *{ box-sizing: border-box; }
  body{
    margin:0;
    background: var(--paper);
    background-image:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.5), transparent 60%),
      radial-gradient(ellipse at bottom right, rgba(0,0,0,0.03), transparent 55%);
    color: var(--ink);
    font-family: 'Lora', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    padding: 48px 18px 90px;
    -webkit-font-smoothing: antialiased;
  }
  .sheet{
    max-width: 560px;
    margin: 0 auto;
    background: var(--paper-card);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 40px 34px 30px;
    box-shadow: 0 18px 40px -20px rgba(80, 60, 30, 0.35), 0 2px 6px rgba(80,60,30,0.06);
  }

  .seal{
    width: 40px; height: 40px;
    border-radius: 50%;
    margin: 0 auto 20px;
    background: radial-gradient(circle at 32% 30%, #cf6c50, var(--seal) 70%);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.25), 0 2px 5px rgba(181,88,63,0.35);
  }

  h1{
    font-family: 'Cormorant Garamond', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-weight: 600;
    font-size: 30px;
    text-align:center;
    margin: 0 0 6px;
    letter-spacing: 0.02em;
  }

  .sub{
    text-align:center;
    color: var(--ink-soft);
    font-size: 13.5px;
    font-style: italic;
    line-height:1.8;
    margin: 0 0 26px;
    padding-bottom: 22px;
    border-bottom: 1px dashed var(--border);
  }

  .track{
    display: flex; align-items: center; justify-content: space-between; gap: 14px;
    padding: 13px 2px;
    border-bottom: 1px dashed var(--border);
    transition: opacity .2s ease;
  }
  .track:last-child{ border-bottom: none; }
  .track.done{ opacity: 0.42; }

  .info b{
    font-family: 'Lora', 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-size: 15px;
    font-weight: 500;
  }
  .info .artist{
    display:block;
    color: var(--ink-soft);
    font-size: 12.5px;
    margin-top: 2px;
  }
  .info .album{
    display:block;
    color: var(--ink-soft);
    font-size: 12.5px;
    margin-top: 2px;
  }

  .actions{ display:flex; align-items:center; gap: 12px; flex-shrink:0; }

  .actions a{
    display:flex; align-items:center; justify-content:center;
    width: 42px; height: 42px;
    border-radius: 50%;
    text-decoration:none;
    color: #fbf6ee;
    background: var(--accent);
    box-shadow: 0 3px 8px -2px rgba(79,109,105,0.55), inset 0 1px 0 rgba(255,255,255,0.15);
    transition: background .15s ease, transform .08s ease, opacity .15s ease;
  }
  .actions a:hover{ background: var(--accent-deep); }
  .actions a:active{ transform: scale(0.86); }
  .actions a svg{ width: 16px; height: 16px; }
  .actions a.loading{
    background: var(--border);
    box-shadow: none;
    pointer-events: none;
  }
  .actions a.loading svg{ display:none; }
  .actions a.loading::after{
    content:'';
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-soft);
    animation: pulse 1.1s ease-in-out infinite;
  }
  @keyframes pulse{ 0%,100%{ opacity:0.3; } 50%{ opacity:0.9; } }

  .doneToggle{
    -webkit-appearance:none; appearance:none;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--paper-card);
    cursor:pointer;
    position:relative;
    flex-shrink:0;
  }
  .doneToggle:checked{
    background: var(--seal);
    border-color: var(--seal);
  }
  .doneToggle:checked::after{
    content:'✓';
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    color:#fbf6ee; font-size: 12px; font-family: sans-serif;
  }

  footer{
    text-align:center;
    margin-top: 28px;
    font-size: 11.5px;
    color: var(--ink-soft);
    font-style: italic;
    letter-spacing: 0.04em;
  }

  @media (prefers-reduced-motion: reduce){ *{ transition:none !important; } }
</style>
</head>

function parseCSVLine(line) {
  const result = [];
  let current = "";
  let inQuotes = false;
  for (let c of line) {
    if (c === '"') inQuotes = !inQuotes;
    else if (c === "," && !inQuotes) {
      result.push(current);
      current = "";
    } else {
      current += c;
    }
  }
  result.push(current);
  return result.map(s => s.replace(/"/g, "").trim());
}

let tracks = [];

// --- JSONP(fetchがCORSで失敗した場合の保険) ---
function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = "uniplayCb_" + Math.random().toString(36).slice(2);
    const script = document.createElement("script");
    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error("timeout"));
    }, 6000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      script.remove();
    }

    window[cbName] = (data) => {
      cleanup();
      resolve(data);
    };
    script.onerror = () => { cleanup(); reject(new Error("script load error")); };
    script.src = url + (url.includes("?") ? "&" : "?") + "callback=" + cbName;
    document.body.appendChild(script);
  });
}

// アルバム名込みの検索結果ページ(最終フォールバック用)
function fallbackSearchUrl(t) {
  const query = encodeURIComponent(`${t.title} ${t.artist} ${t.album}`);
  return `https://music.apple.com/jp/search?term=${query}`;
}

async function resolveTopHit(t) {
  const term = encodeURIComponent(`${t.title} ${t.artist} ${t.album}`);
  const apiUrl = `https://itunes.apple.com/search?term=${term}&media=music&entity=song&limit=1&country=jp`;

  // 1. まずは素直にfetch
  try {
    const res = await fetch(apiUrl);
    if (res.ok) {
      const data = await res.json();
      const hit = data.results && data.results[0];
      if (hit && hit.trackViewUrl) {
        console.log(`[UniPlay] fetchで解決: ${t.title} →`, hit.trackViewUrl);
        return hit.trackViewUrl;
      }
      console.warn(`[UniPlay] fetchは成功したが該当曲なし: ${t.title}`);
    } else {
      console.warn(`[UniPlay] fetch失敗 (status ${res.status}): ${t.title}`);
    }
  } catch (e) {
    console.warn(`[UniPlay] fetchでエラー(CORSの可能性): ${t.title}`, e);
  }

  // 2. ダメならJSONPで再挑戦
  try {
    const data = await jsonp(apiUrl);
    const hit = data.results && data.results[0];
    if (hit && hit.trackViewUrl) {
      console.log(`[UniPlay] JSONPで解決: ${t.title} →`, hit.trackViewUrl);
      return hit.trackViewUrl;
    }
    console.warn(`[UniPlay] JSONPは成功したが該当曲なし: ${t.title}`);
  } catch (e) {
    console.warn(`[UniPlay] JSONPでもエラー: ${t.title}`, e);
  }

  // 3. 両方だめなら検索結果ページへ(アルバム名込み)
  console.warn(`[UniPlay] トップヒット解決を諦めて検索ページへ: ${t.title}`);
  return fallbackSearchUrl(t);
}

function render() {
  const output = document.getElementById("output");
  output.innerHTML = "";
  tracks.forEach((t, i) => {
    const div = document.createElement("div");
    div.className = "track" + (t.done ? " done" : "");
    div.innerHTML = `
      <div class="info">
        <b>${t.title}</b>
        <span class="artist">${t.artist}</span>
        <span class="album">〈${t.album}〉</span>
      </div>
      <div class="actions">
        <a class="${t.resolved ? "" : "loading"}" target="_blank"
           href="${t.url || fallbackSearchUrl(t)}"
           onclick="markDone(${i})" aria-label="Apple Musicで開く">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round" stroke-linejoin="round">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
          </svg>
        </a>
        <input type="checkbox" class="doneToggle" ${t.done ? "checked" : ""} onchange="toggleDone(${i})">
      </div>
    `;
    output.appendChild(div);
  });
}

function markDone(i) {
  tracks[i].done = true;
  render();
}

function toggleDone(i) {
  tracks[i].done = !tracks[i].done;
  render();
}

async function init() {
  const lines = csvData.replace(/^\uFEFF/, "").split("\n");
  const header = parseCSVLine(lines[0]);
  const titleIdx = header.indexOf("Track Name");
  const artistIdx = header.indexOf("Artist Name(s)");
  const albumIdx = header.indexOf("Album Name");

  for (let i = 1; i < lines.length; i++) {
    if (!lines[i].trim()) continue;
    const cols = parseCSVLine(lines[i]);
    const title = cols[titleIdx];
    const artist = cols[artistIdx];
    const album = cols[albumIdx] || "";
    if (!title || !artist) continue;
    tracks.push({ title, artist, album, done: false, url: null, resolved: false });
  }
  render();

  tracks.forEach(async (t, i) => {
    const url = await resolveTopHit(t);
    tracks[i].url = url;
    tracks[i].resolved = true;
    render();
  });
}

init();
</script>
